<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=1440">
  <title>三十六贱笑 · 后台管理</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /* ============ APPLE DESIGN TOKENS (from DESIGN.md) ============ */
    :root {
      /* Brand & accent */
      --primary:        #0066cc;
      --primary-focus:  #0071e3;
      --primary-on-dark:#2997ff;
      --primary-press:  #005bb8;

      /* Surface */
      --canvas:         #ffffff;
      --parchment:      #f5f5f7;
      --pearl:          #fafafc;
      --tile-1:         #272729;
      --tile-2:         #2a2a2c;
      --tile-3:         #252527;
      --black:          #000000;
      --chip-translucent:rgba(210,210,215,0.64);

      /* Text */
      --ink:            #1d1d1f;
      --on-dark:        #ffffff;
      --body-muted:     #cccccc;
      --ink-80:         #333333;
      --ink-48:         #7a7a7a;

      /* Hairlines */
      --divider-soft:   rgba(0,0,0,0.04);
      --hairline:       #e0e0e0;
      --hairline-strong:#d2d2d7;

      /* Shape */
      --r-sm:  8px;
      --r-md: 11px;
      --r-lg: 18px;
      --r-pill: 9999px;

      /* Type — SF Pro stack with Noto Sans SC for Chinese */
      --font-display: "SF Pro Display","Inter","Noto Sans SC", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      --font-text:    "SF Pro Text","Inter","Noto Sans SC", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      --font-mono:    "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;

      /* The single shadow — product imagery only */
      --shadow-product: rgba(0,0,0,0.22) 3px 5px 30px 0;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: var(--parchment); color: var(--ink); }
    body {
      font-family: var(--font-text);
      font-size: 17px;
      line-height: 1.47;
      letter-spacing: -0.022em;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      min-width: 1200px;
    }
    a { color: var(--primary); text-decoration: none; }
    a:hover { text-decoration: underline; text-underline-offset: 2px; }

    /* ============ TYPE ============ */
    .t-hero        { font-family: var(--font-display); font-size: 56px; font-weight: 600; line-height: 1.07; letter-spacing: -0.018em; }
    .t-display-lg  { font-family: var(--font-display); font-size: 40px; font-weight: 600; line-height: 1.10; letter-spacing: -0.011em; }
    .t-display-md  { font-family: var(--font-text);    font-size: 34px; font-weight: 600; line-height: 1.18; letter-spacing: -0.012em; }
    .t-lead        { font-family: var(--font-display); font-size: 28px; font-weight: 400; line-height: 1.21; letter-spacing: 0.007em; }
    .t-lead-airy   { font-family: var(--font-text);    font-size: 24px; font-weight: 300; line-height: 1.5;  letter-spacing: 0; }
    .t-tagline     { font-family: var(--font-display); font-size: 21px; font-weight: 600; line-height: 1.19; letter-spacing: 0.011em; }
    .t-body-strong { font-family: var(--font-text); font-size: 17px; font-weight: 600; line-height: 1.24; letter-spacing: -0.022em; }
    .t-body        { font-family: var(--font-text); font-size: 17px; font-weight: 400; line-height: 1.47; letter-spacing: -0.022em; }
    .t-caption     { font-family: var(--font-text); font-size: 14px; font-weight: 400; line-height: 1.43; letter-spacing: -0.016em; }
    .t-caption-strong{font-family: var(--font-text); font-size: 14px; font-weight: 600; line-height: 1.29; letter-spacing: -0.016em; }
    .t-button-util { font-family: var(--font-text); font-size: 14px; font-weight: 400; line-height: 1.29; letter-spacing: -0.016em; }
    .t-fine        { font-family: var(--font-text); font-size: 12px; font-weight: 400; line-height: 1.0;  letter-spacing: -0.01em; }
    .t-nav         { font-family: var(--font-text); font-size: 12px; font-weight: 400; line-height: 1.0;  letter-spacing: -0.01em; }
    .t-mono        { font-family: var(--font-mono); font-size: 13px; letter-spacing: 0; }
    .t-mono-sm     { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0; }

    /* ============ CHROME — global nav + sub-nav ============ */
    .global-nav {
      position: sticky; top: 0; z-index: 50;
      height: 44px;
      background: var(--black);
      color: var(--on-dark);
      display: flex; align-items: center;
      padding: 0 22px;
      gap: 28px;
    }
    .global-nav .wordmark {
      font-family: var(--font-display);
      font-size: 17px; font-weight: 600; letter-spacing: -0.01em;
      color: #fff;
      display: inline-flex; align-items: center;
      gap: 8px;
    }
    .global-nav .wordmark .last { border-bottom: 2px solid var(--primary-on-dark); padding-bottom: 1px; }
    .global-nav .glink {
      font-family: var(--font-text); font-size: 12px; color: #f5f5f7; opacity: 0.88;
      cursor: pointer;
    }
    .global-nav .glink:hover { opacity: 1; }
    .global-nav .right { margin-left: auto; display: flex; align-items: center; gap: 18px; }
    .global-nav .iconbtn { color: #f5f5f7; cursor: pointer; opacity: 0.88; }
    .global-nav .iconbtn:hover { opacity: 1; }
    .global-nav .ver { font-family: var(--font-mono); font-size: 11px; color: #86868b; }

    .sub-nav {
      position: sticky; top: 44px; z-index: 49;
      height: 52px;
      background: rgba(245,245,247,0.80);
      backdrop-filter: saturate(180%) blur(20px);
      -webkit-backdrop-filter: saturate(180%) blur(20px);
      border-bottom: 1px solid var(--divider-soft);
      display: flex; align-items: center;
      padding: 0 22px;
      gap: 24px;
    }
    .sub-nav .category {
      font-family: var(--font-display); font-size: 21px; font-weight: 600;
      letter-spacing: 0.011em; color: var(--ink);
      padding-right: 24px;
      margin-right: 4px;
      border-right: 1px solid var(--hairline);
    }
    .sub-nav .links { display: flex; gap: 18px; align-items: center; }
    .sub-nav .link {
      font-family: var(--font-text); font-size: 14px; font-weight: 400;
      letter-spacing: -0.016em; color: var(--ink-80);
      cursor: pointer;
      padding: 6px 2px;
      border-bottom: 2px solid transparent;
      transition: color 120ms cubic-bezier(0.32,0.72,0,1);
    }
    .sub-nav .link:hover { color: var(--ink); }
    .sub-nav .link.active {
      color: var(--ink);
      border-bottom-color: var(--ink);
    }
    .sub-nav .right { margin-left: auto; display: flex; gap: 12px; align-items: center; }

    /* ============ BUTTONS — pill + utility rect ============ */
    .btn {
      font-family: var(--font-text);
      cursor: pointer;
      border: 0;
      display: inline-flex; align-items: center; justify-content: center;
      gap: 6px;
      transition: transform 120ms cubic-bezier(0.32,0.72,0,1), background-color 120ms;
      white-space: nowrap;
    }
    .btn:active { transform: scale(0.96); }
    .btn:focus-visible { outline: 2px solid var(--primary-focus); outline-offset: 2px; }

    /* Primary pill — Action Blue */
    .btn-primary {
      background: var(--primary);
      color: #fff;
      font-size: 17px; font-weight: 400; letter-spacing: -0.022em;
      padding: 8px 20px;
      border-radius: var(--r-pill);
      line-height: 1.47;
    }
    .btn-primary:hover { background: var(--primary-focus); }

    /* Ghost pill — text on transparent w/ blue ring */
    .btn-ghost-pill {
      background: transparent;
      color: var(--primary);
      border: 1px solid var(--primary);
      font-size: 17px; font-weight: 400; letter-spacing: -0.022em;
      padding: 7px 19px;
      border-radius: var(--r-pill);
    }
    .btn-ghost-pill:hover { background: var(--primary); color: #fff; }

    /* Dark utility rect — global nav style */
    .btn-dark {
      background: var(--ink);
      color: #fff;
      font-size: 14px; font-weight: 400; letter-spacing: -0.016em;
      padding: 7px 15px;
      border-radius: var(--r-sm);
    }
    .btn-dark:hover { background: #2d2d2f; }

    /* Pearl capsule */
    .btn-pearl {
      background: var(--pearl);
      color: var(--ink-80);
      font-size: 14px; letter-spacing: -0.016em;
      padding: 8px 14px;
      border-radius: var(--r-md);
      box-shadow: inset 0 0 0 1px var(--divider-soft);
    }
    .btn-pearl:hover { background: #fff; box-shadow: inset 0 0 0 1px var(--hairline); }

    /* Store hero — bigger pill */
    .btn-hero {
      background: var(--primary);
      color: #fff;
      font-family: var(--font-text);
      font-size: 18px; font-weight: 300; line-height: 1;
      padding: 14px 28px;
      border-radius: var(--r-pill);
    }
    .btn-hero:hover { background: var(--primary-focus); }

    /* Small text-link */
    .tlink { color: var(--primary); cursor: pointer; font-size: 17px; }
    .tlink:hover { text-decoration: underline; text-underline-offset: 2px; }
    .tlink.sm { font-size: 14px; }
    .tlink.on-dark { color: var(--primary-on-dark); }
    .tlink-chevron::after { content: " ›"; font-weight: 300; }

    /* ============ CARDS ============ */
    .util-card {
      background: var(--canvas);
      border: 1px solid var(--hairline);
      border-radius: var(--r-lg);
      padding: 24px;
    }

    /* Tiles — full bleed */
    .tile {
      width: 100%;
      padding: 80px 48px;
      text-align: center;
      border-radius: 0;
    }
    .tile.parchment { background: var(--parchment); color: var(--ink); }
    .tile.white     { background: var(--canvas);    color: var(--ink); }
    .tile.dark      { background: var(--tile-1);    color: var(--on-dark); }
    .tile.dark-2    { background: var(--tile-2);    color: var(--on-dark); }
    .tile.dark-3    { background: var(--tile-3);    color: var(--on-dark); }
    .tile.black     { background: var(--black);     color: var(--on-dark); }

    /* The one product shadow */
    .product-shadow { box-shadow: var(--shadow-product); }

    /* Chips */
    .chip {
      display: inline-flex; align-items: center; gap: 6px;
      font-family: var(--font-text); font-size: 12px;
      padding: 4px 10px;
      border-radius: var(--r-pill);
      background: rgba(0,0,0,0.04);
      color: var(--ink-80);
      letter-spacing: -0.01em;
    }
    .chip.on-dark { background: rgba(255,255,255,0.10); color: var(--body-muted); }
    .chip.success { background: rgba(48,162,114,0.12); color: #1f6f50; }
    .chip.warn    { background: rgba(242,180,65,0.18); color: #875a08; }
    .chip.error   { background: rgba(225,57,44,0.10); color: #b22a1f; }
    .chip.dot::before {
      content: ""; display: inline-block; width: 6px; height: 6px; border-radius: 50%;
      background: currentColor;
    }

    /* Inputs */
    .input-pill {
      font-family: var(--font-text); font-size: 17px; letter-spacing: -0.022em;
      background: var(--canvas);
      color: var(--ink);
      border: 1px solid var(--divider-soft);
      padding: 10px 20px;
      height: 44px;
      border-radius: var(--r-pill);
      outline: none;
      width: 100%;
    }
    .input-pill::placeholder { color: var(--ink-48); }
    .input-pill:focus { box-shadow: 0 0 0 4px rgba(0,113,227,0.18); border-color: var(--primary-focus); }

    .input-rect {
      font-family: var(--font-text); font-size: 17px; letter-spacing: -0.022em;
      background: var(--canvas);
      color: var(--ink);
      border: 1px solid var(--hairline);
      padding: 10px 14px;
      border-radius: var(--r-sm);
      outline: none;
      width: 100%;
    }
    .input-rect:focus { box-shadow: 0 0 0 4px rgba(0,113,227,0.18); border-color: var(--primary-focus); }

    /* Layout */
    .container { max-width: 1440px; margin: 0 auto; padding: 0 22px; }
    .container-narrow { max-width: 980px; margin: 0 auto; padding: 0 22px; }

    /* Scrollbars */
    *::-webkit-scrollbar { width: 10px; height: 10px; }
    *::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.18); border-radius: 999px; border: 2px solid transparent; background-clip: padding-box; }
    *::-webkit-scrollbar-thumb:hover { background: rgba(0,0,0,0.28); background-clip: padding-box; border: 2px solid transparent; }
    *::-webkit-scrollbar-track { background: transparent; }

    /* App layout — tiles stack edge-to-edge inside main */
    main { background: var(--canvas); }
    main.parchment { background: var(--parchment); }

    /* Accent — vermillion underscore for the wordmark only */
    .wordmark-zh {
      font-family: var(--font-display);
      font-weight: 700;
      letter-spacing: -0.005em;
      color: var(--ink);
    }

    /* Reduced motion respect */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { transition: none !important; animation: none !important; }
    }

    /* Animated cursor for streaming */
    @keyframes apple-blink { 0%,49% { opacity: 1; } 50%,100% { opacity: 0; } }
    .blink-cursor { animation: apple-blink 1s steps(1) infinite; }

    /* Visual rule for split cards */
    .vrule { width: 1px; background: var(--divider-soft); align-self: stretch; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="primitives.jsx"></script>
  <script type="text/babel" src="chrome.jsx"></script>
  <script type="text/babel" src="views/overview.jsx"></script>
  <script type="text/babel" src="views/chat.jsx"></script>
  <script type="text/babel" src="views/persona.jsx"></script>

  <script type="text/babel" src="views/skills.jsx"></script>

  <script type="text/babel" src="views/permissions.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>
</body>
</html>
